name: Deploy PR previews with Netlify

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: install deps
        uses: actions/setup-node@v4
        with:
          node-version: v20.x

      - name: Install Hugo CLI
        env:
          HUGO_VERSION: 0.137.1
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: npm install -g sass

      - name: Install Node.js dependencies
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

      - name: Install Python dependencies
        run: pip3 install thefuzz python-Levenshtein requests

      - name: Set and export API keys
        run: |
          echo "API_KEY=${{ secrets.RADIOCULT_API_KEY }}" >> $GITHUB_ENV
          echo "SOUNDCLOUD_CLIENT_ID=${{ secrets.SOUNDCLOUD_CLIENT_ID }}" >> $GITHUB_ENV
          echo "SOUNDCLOUD_CLIENT_SECRET=${{ secrets.SOUNDCLOUD_CLIENT_SECRET }}" >> $GITHUB_ENV

      - name: Generate artist pages
        run: python3 generate-artist-pages.py

      - name: Align artist images for hero sections
        run: python3 scripts/detect-faces.py || true

      - name: Generate show cache
        run: python3 generate-show-cache.py

      - name: Generate show pages
        run: python3 generate-show-pages.py

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          TZ: Europe/Dublin
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Deploy to Netlify Preview
        uses: nwtgck/actions-netlify@v3.0
        id: netlify_preview
        with:
          publish-dir: public
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "PR preview (#${{ github.event.pull_request.number }})"
          alias: preview-${{ github.event.pull_request.number }}
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Fetch preview URL
        run: |
          echo "Preview URL: ${{ steps.netlify_preview.outputs.deploy-url }}"
